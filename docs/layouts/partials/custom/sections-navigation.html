{{- $prevLink := .prevLink -}}
{{- $prevTitle := .prevTitle -}}
{{- $nextLink := .nextLink -}}
{{- $nextTitle := .nextTitle -}}

<div class="section-nav">

  {{- if $prevLink -}}
  <a class="section-nav-link section-nav-prev"
    title="{{ $prevTitle }}" href="{{ $prevLink }}">
    <svg class="section-nav-icon section-nav-icon-prev" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
    {{- $prevTitle -}}
  </a>
  {{- end }}

  {{- if $nextLink -}}
  <a class="section-nav-link section-nav-next"
    title="{{ $nextTitle }}" href="{{ $nextLink }}">
    {{- $nextTitle -}}
    <svg class="section-nav-icon section-nav-icon-next" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
  </a>
  {{- end }}

</div>
{{- /* Strip trailing newline. */ -}}
