name: Self test install / extend

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: ["main"]
    paths:
      - "tests.d/install/**"
      - "commands.d/self-install.sh"
      - "commands.d/self-extend.sh"
  pull_request:
    paths:
      - "tests.d/install/**"
      - "commands.d/self-install.sh"
      - "commands.d/self-extend.sh"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Default to bash
defaults:
  run:
    shell: bash -o errexit -o nounset -o pipefail -x {0}

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  self-test-install:
    # We run this job in a container to avoid polluting the host
    runs-on: ubuntu-latest
    steps:
      # checkout the repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      # Runs our tests
      - name: Run valet self install && self update && self extend
        env:
          RUNNING_IN_DOCKER: true
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          chmod +x ./tests.d/install/test
          chmod +x ./tests.d/install/test
          docker run --rm \
            -v $PWD:/app \
            -w /app \
            -e VALET_CONFIG_ENABLE_COLORS=true \
            -e RUNNING_IN_DOCKER=true \
            -e BRANCH_NAME=${BRANCH_NAME} \
            --user root \
            --entrypoint /usr/local/bin/bash-5.0 \
            noyacode/valet-tests-slimdeb:latest \
            ./tests.d/install/test
